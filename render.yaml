services:
  - type: web
    name: flower-choco-shop
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    releaseCommand: |
      python manage.py migrate
      python manage.py setup_permissions
      python manage.py seed_expense_categories
    startCommand: python manage.py migrate --noinput && python manage.py setup_permissions && python manage.py seed_expense_categories && gunicorn shop_management.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: shop_management.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flower-choco-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: SHOP_NAME
        value: روز وشوكولاته
      - key: SHOP_PHONE
        value: +966500000000
      - key: SHOP_EMAIL
        value: info@example.com
      - key: CURRENCY_SYMBOL
        value: ر.ع
    healthCheckPath: /login/
    autoDeploy: true

  - type: worker
    name: flower-choco-worker
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py process_tasks
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: shop_management.settings_production
      - key: DATABASE_URL
        fromDatabase:
          name: flower-choco-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: flower-choco-db
    databaseName: flower_choco_shop
    user: shop_user
    plan: free
    region: frankfurt
