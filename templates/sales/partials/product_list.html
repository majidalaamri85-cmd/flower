{% for product in products %}
<div class="col-md-4 col-lg-3">
    <div class="card panel h-100">
        <div class="card-body">
            <h6 class="mb-1">{{ product.name }}</h6>
            <div class="text-muted small mb-2">{{ product.get_type_display }}</div>
            <div class="d-flex justify-content-between align-items-center">
                <strong>{{ product.selling_price }} ريال</strong>
                <button type="button" class="btn btn-sm btn-primary" onclick="addToCart({{ product.id }})">إضافة</button>
            </div>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12"><div class="alert alert-warning mb-0">لا توجد منتجات مطابقة.</div></div>
{% endfor %}
