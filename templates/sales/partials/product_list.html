{% for product in products %}
<div class="col-md-4 col-lg-3">
    <div class="card panel pos-product-card h-100">
        <div class="card-body d-flex flex-column justify-content-between gap-3">
            <div>
                <span class="product-type-chip mb-2 d-inline-flex">{{ product.get_type_display }}</span>
                <h6 class="mb-1">{{ product.name }}</h6>
                <div class="text-muted small mb-2">المتوفر: {{ product.quantity }}</div>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <strong class="text-primary">{{ product.selling_price }} {{ settings.currency_symbol }}</strong>
                <button type="button" class="btn btn-sm btn-primary" onclick="addToCart({{ product.id }})">إضافة 1</button>
            </div>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12"><div class="alert alert-warning mb-0">لا توجد منتجات مطابقة.</div></div>
{% endfor %}
