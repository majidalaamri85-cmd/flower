{% if cart_items %}
    {% for item in cart_items %}
        <div class="cart-item mb-2">
            <div class="d-flex justify-content-between gap-2">
                <strong>{{ item.name }}</strong>
                <span class="cart-item__total">{{ item.total }} {{ settings.currency_symbol }}</span>
            </div>
            <div class="cart-item__controls mt-2">
                <button class="btn btn-sm btn-light border cart-qty-btn" type="button" onclick="stepCartQuantity('{{ item.id }}', -1)" aria-label="تقليل الكمية">-</button>
                <input class="form-control form-control-sm cart-qty-input" type="number" min="1" step="1" value="{{ item.quantity }}" inputmode="decimal" data-cart-product="{{ item.id }}" onchange="updateCart('{{ item.id }}', this.value)" aria-label="كمية {{ item.name }}">
                <button class="btn btn-sm btn-light border cart-qty-btn" type="button" onclick="stepCartQuantity('{{ item.id }}', 1)" aria-label="زيادة الكمية">+</button>
                <button class="btn btn-sm btn-outline-danger cart-remove-btn" type="button" onclick="removeFromCart('{{ item.id }}')">حذف</button>
            </div>
        </div>
    {% endfor %}
{% else %}
    <div class="cart-empty text-muted">السلة فارغة.</div>
{% endif %}
