{% if cart_items %}
    {% for item in cart_items %}
        <div class="cart-item mb-2">
            <div class="d-flex justify-content-between"><strong>{{ item.name }}</strong><span>{{ item.total }} {{ settings.currency_symbol }}</span></div>
            <div class="d-flex gap-2 mt-2">
                <input class="form-control form-control-sm" type="number" min="1" step="0.01" value="{{ item.quantity }}" onchange="updateCart('{{ item.id }}', this.value)">
                <button class="btn btn-sm btn-outline-danger" type="button" onclick="removeFromCart('{{ item.id }}')">حذف</button>
            </div>
        </div>
    {% endfor %}
{% else %}
    <p class="text-muted mb-0">السلة فارغة.</p>
{% endif %}
