{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card panel"><div class="card-body p-4">
    <h3 class="mb-4">{{ title }}</h3>
    <div class="row g-3">
        <div class="col-md-4"><div class="p-3 bg-light rounded">المبيعات: <strong>{{ sales_total }}</strong></div></div>
        <div class="col-md-4"><div class="p-3 bg-light rounded">المصروفات: <strong>{{ expenses_total }}</strong></div></div>
        <div class="col-md-4"><div class="p-3 bg-light rounded">الربح: <strong>{{ profit }}</strong></div></div>
    </div>
    {% if sales_count is not None %}<div class="mt-3 text-muted">عدد الفواتير: {{ sales_count }}</div>{% endif %}
</div></div>
{% endblock %}
