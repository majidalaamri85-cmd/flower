{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card panel"><div class="card-body p-4">
    <h3 class="mb-3">{{ title }}</h3>
    <table class="table">
        <thead><tr><th>اليوم</th><th>الإجمالي</th><th>العدد</th></tr></thead>
        <tbody>
        {% for row in daily_totals %}
            <tr><td>{{ row.day }}</td><td>{{ row.total }}</td><td>{{ row.count }}</td></tr>
        {% empty %}<tr><td colspan="3">لا توجد بيانات</td></tr>{% endfor %}
        </tbody>
    </table>
</div></div>
{% endblock %}
