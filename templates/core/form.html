{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card panel">
    <div class="card-body p-4">
        <h3 class="mb-4">{{ title }}</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary">حفظ</button>
        </form>
    </div>
</div>
{% endblock %}
