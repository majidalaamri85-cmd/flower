{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-hero panel p-4 mb-4">
    <span class="page-kicker text-primary">النماذج</span>
    <h3 class="mb-1">{{ title }}</h3>
    <p class="mb-0 text-muted">إدخال منظم ومريح على الهاتف والتابلت وسطح المكتب.</p>
</div>

<div class="card panel form-card">
    <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data" class="stacked-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions d-flex flex-wrap gap-2">
                <button class="btn btn-primary" type="submit">حفظ</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
