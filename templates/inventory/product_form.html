{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}

<div class="page-hero panel p-4 mb-4">
    <span class="page-kicker text-primary">المنتجات</span>
    <h3 class="mb-1">{{ title }}</h3>
    <p class="mb-0 text-muted">نموذج مهيأ للإدخال السريع والواضح على كل الأجهزة.</p>
</div>

<div class="card panel form-card">
	<div class="card-body p-4">
		<form method="post" enctype="multipart/form-data" class="stacked-form">
			{% csrf_token %}
			{{ form.as_p }}
			<div class="form-actions d-flex flex-wrap gap-2">
				<button class="btn btn-primary" type="submit">حفظ</button>
				<a class="btn btn-light border" href="{% url 'inventory:product_list' %}">إلغاء</a>
			</div>
		</form>
	</div>
</div>
{% endblock %}
