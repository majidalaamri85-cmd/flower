{% extends 'base.html' %}
{% block title %}تعديل مخزون{% endblock %}
{% block content %}
<div class="page-hero panel p-4 mb-4">
    <span class="page-kicker text-primary">المخزون</span>
    <h3 class="mb-1">تعديل مخزون: {{ product.name }}</h3>
    <p class="mb-0 text-muted">اضبط الكمية بسرعة مع واجهة إدخال واضحة ومناسبة للهاتف.</p>
</div>

<div class="card panel form-card">
    <div class="card-body p-4">
        <form method="post" class="stacked-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions d-flex flex-wrap gap-2">
                <button class="btn btn-primary" type="submit">حفظ</button>
                <a class="btn btn-light border" href="{% url 'inventory:product_list' %}">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
