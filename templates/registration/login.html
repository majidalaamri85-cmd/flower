{% extends 'base.html' %}
{% block title %}تسجيل الدخول{% endblock %}
{% block login_content %}
<div class="container py-5" style="max-width: 520px;">
    <div class="card panel">
        <div class="card-body p-4">
            <h3 class="mb-3 text-center">تسجيل الدخول</h3>
            {% if form.errors %}<div class="alert alert-danger">اسم المستخدم أو كلمة المرور غير صحيحة</div>{% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">دخول</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
